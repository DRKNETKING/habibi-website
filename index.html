<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency Ultra Premium - Jasa Pembuatan Website</title>

<!-- SEO -->
<meta name="description" content="Jasa pembuatan website profesional dengan teknologi modern, AI automation, dan desain premium.">

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{margin:0;font-family:Inter,Arial;background:#0b0b0f;color:white}
header{padding:40px;text-align:center}
h1{font-size:48px}
.section{padding:80px 20px;max-width:1200px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:rgba(255,255,255,0.05);padding:25px;border-radius:14px}
button{padding:12px 20px;border-radius:8px;border:none;background:#4f46e5;color:white;cursor:pointer}
#iphoneCanvas{height:500px}
#map{height:400px;background:#111;border-radius:10px}
input,textarea{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
#dashboard{display:none}
</style>
</head>

<body>

<header>
<h1>Premium Website Agency</h1>
<p>Silicon Valley Level Web Development</p>
</header>

<section class="section">
<h2>3D iPhone Showcase</h2>
<div id="iphoneCanvas"></div>
</section>

<section class="section">
<h2>Services</h2>
<div class="grid">
<div class="card">Landing Page</div>
<div class="card">Company Profile</div>
<div class="card">Ecommerce</div>
<div class="card">SEO Optimization</div>
</div>
</section>

<section class="section">
<h2>Order Website</h2>
<form id="orderForm">
<input placeholder="Nama" required>
<input placeholder="Email" required>
<textarea placeholder="Kebutuhan Website"></textarea>
<button type="submit">Kirim</button>
</form>
</section>

<section class="section">
<h2>Live Visitor Map</h2>
<div id="map"></div>
</section>

<section class="section">
<h2>AI Blog Generator</h2>
<input id="blogTopic" placeholder="Topik artikel SEO">
<button onclick="generateBlog()">Generate Artikel</button>
<div id="blogOutput"></div>
</section>

<section class="section">
<h2>AI Sales Chatbot</h2>
<input id="chatInput" placeholder="Tanya tentang jasa website...">
<button onclick="chatBot()">Kirim</button>
<div id="chatOutput"></div>
</section>

<section class="section">
<h2>Admin Login</h2>
<input id="user" placeholder="username">
<input id="pass" placeholder="password" type="password">
<button onclick="login()">Login</button>
</section>

<section id="dashboard" class="section">
<h2>Admin Dashboard</h2>
<p>Data Lead Client</p>
<ul id="leadList"></ul>

<h3>CMS Blog Editor</h3>
<input id="title" placeholder="judul">
<textarea id="content" placeholder="isi artikel"></textarea>
<button onclick="publishPost()">Publish</button>
<div id="posts"></div>
</section>

<script>

/* 3D IPHONE MODEL */

const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/500,0.1,1000)
const renderer=new THREE.WebGLRenderer({alpha:true})
renderer.setSize(window.innerWidth,500)
document.getElementById("iphoneCanvas").appendChild(renderer.domElement)

const geometry=new THREE.BoxGeometry(2,4,0.3)
const material=new THREE.MeshNormalMaterial()
const phone=new THREE.Mesh(geometry,material)
scene.add(phone)

camera.position.z=6

function animate(){
requestAnimationFrame(animate)
phone.rotation.y+=0.01
renderer.render(scene,camera)
}
animate()

/* MOUSE ROTATE */

document.addEventListener("mousemove",e=>{
phone.rotation.y=e.clientX/500
phone.rotation.x=e.clientY/500
})


/* LEAD STORAGE */

let leads=JSON.parse(localStorage.getItem("leads")||"[]")

orderForm.onsubmit=e=>{
 e.preventDefault()
 const data={
 name:e.target[0].value,
 email:e.target[1].value,
 msg:e.target[2].value
 }
 leads.push(data)
 localStorage.setItem("leads",JSON.stringify(leads))
 alert("Lead masuk!")
}


/* VISITOR MAP DEMO */

const map=document.getElementById("map")
setInterval(()=>{
 const dot=document.createElement("div")
 dot.style.position="absolute"
 dot.style.width="6px"
 dot.style.height="6px"
 dot.style.background="red"
 dot.style.borderRadius="50%"
 dot.style.left=Math.random()*100+"%"
 dot.style.top=Math.random()*100+"%"
 map.appendChild(dot)
},1000)


/* AI BLOG GENERATOR */

async function generateBlog(){
 const topic=document.getElementById("blogTopic").value
 const res=await fetch("https://api.openai.com/v1/chat/completions",{
 method:"POST",
 headers:{
  "Content-Type":"application/json",
  "Authorization":"Bearer YOUR_OPENAI_KEY"
 },
 body:JSON.stringify({
  model:"gpt-4o-mini",
  messages:[{role:"user",content:"buat artikel SEO tentang "+topic}]
 })
 })

 const data=await res.json()
 blogOutput.innerHTML=marked.parse(data.choices[0].message.content)
}


/* AI SALES BOT */

async function chatBot(){
 const q=chatInput.value

 const res=await fetch("https://api.openai.com/v1/chat/completions",{
 method:"POST",
 headers:{
  "Content-Type":"application/json",
  "Authorization":"Bearer YOUR_OPENAI_KEY"
 },
 body:JSON.stringify({
  model:"gpt-4o-mini",
  messages:[
   {role:"system",content:"kamu adalah sales jasa pembuatan website profesional"},
   {role:"user",content:q}
  ]
 })
 })

 const data=await res.json()
 chatOutput.innerText=data.choices[0].message.content
}


/* ADMIN LOGIN */

function login(){
 const u=user.value
 const p=pass.value
 if(u=="admin" && p=="habib"){
  dashboard.style.display="block"
  renderLeads()
 }
}


function renderLeads(){
 leadList.innerHTML=""
 leads.forEach(l=>{
  const li=document.createElement("li")
  li.textContent=l.name+" - "+l.email
  leadList.appendChild(li)
 })
}


/* MINI CMS */

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

function publishPost(){
 const post={
  title:title.value,
  content:content.value
 }

 posts.push(post)
 localStorage.setItem("posts",JSON.stringify(posts))
 renderPosts()
}

function renderPosts(){
 postsDiv=document.getElementById("posts")
 postsDiv.innerHTML=""
 posts.forEach(p=>{
  const div=document.createElement("div")
  div.className="card"
  div.innerHTML="<h4>"+p.title+"</h4><p>"+p.content+"</p>"
  postsDiv.appendChild(div)
 })
}

renderPosts()

</script>

</body>
</html>
